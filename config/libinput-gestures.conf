# 47 Industries - Touchpad Gestures (macOS-style)
# Three-finger swipe left/right = switch workspace
gesture swipe left  3 dbus-send --dest=org.Cinnamon --print-reply /org/Cinnamon org.Cinnamon.switchWorkspaceRight
gesture swipe right 3 dbus-send --dest=org.Cinnamon --print-reply /org/Cinnamon org.Cinnamon.switchWorkspaceLeft
# Three-finger swipe up = Mission Control (Expo)
gesture swipe up    3 dbus-send --dest=org.Cinnamon --print-reply /org/Cinnamon org.Cinnamon.ShowExpo
# Three-finger swipe down = show desktop
gesture swipe down  3 wmctrl -k on
# Pinch in = zoom out (overview)
gesture pinch in    3 dbus-send --dest=org.Cinnamon --print-reply /org/Cinnamon org.Cinnamon.ShowExpo
